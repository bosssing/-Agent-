<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校招求职助手</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #495057;
            margin-bottom: 20px;
        }
        p {
            color: #6c757d;
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 校招求职全流程多Agent协同智能助手</h1>
        <p>项目已成功创建！</p>
        <p>请按照以下步骤运行：</p>
        <ol style="text-align: left; margin: 20px 0;">
            <li>安装依赖：pip install -r requirements.txt</li>
            <li>启动服务：uvicorn api.main:app --reload --host 0.0.0.0 --port 8000</li>
            <li>访问：http://localhost:8000</li>
        </ol>
        <button class="btn" onclick="window.location.href='frontend/index.html'">打开前端界面</button>
    </div>
</body>
</html>
